<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>TRVI — tulip-rs-wasm example</title>
        <style>
            body {
                font-family: monospace;
                padding: 1rem;
                background: #fafafa;
                color: #222;
            }
            h1 {
                font-size: 1.1rem;
                margin: 0 0 0.25rem;
            }
            p {
                color: #666;
                margin: 0 0 1rem;
                font-size: 0.85rem;
            }
            pre {
                background: #f0f0f0;
                padding: 1rem;
                border-radius: 4px;
                white-space: pre-wrap;
                word-break: break-all;
                line-height: 1.5;
            }
        </style>
    </head>
    <body>
        <h1>TRVI — True Range Volatility Indicator</h1>
        <p>
            Build:
            <code
                >wasm-pack build --target web --out-dir pkg &amp;&amp; npx
                tsc</code
            >, then serve this directory and open in a browser.
        </p>
        <pre id="out">Loading…</pre>
        <script type="module">
            import { init, trvi } from "../index.js";

            const lines = [];
            function log(msg = "") {
                console.log(msg);
                lines.push(String(msg));
                document.getElementById("out").textContent = lines.join("\n");
            }

            try {
                await init();

                const high  = [82.15, 81.89, 83.03, 83.30, 83.85, 83.90, 83.33, 84.30, 84.84, 85.00, 85.90, 86.58, 86.98, 88.00, 87.87, 88.50, 89.20, 89.75, 90.10, 89.80];
                const low   = [81.29, 80.64, 81.31, 82.65, 83.07, 83.11, 82.49, 82.30, 84.15, 84.11, 84.03, 85.39, 85.76, 87.17, 87.01, 87.60, 88.15, 88.90, 89.40, 88.95];
                const close = [81.59, 81.06, 82.87, 83.00, 83.61, 83.15, 82.84, 83.99, 84.55, 84.36, 85.53, 86.54, 86.89, 87.77, 87.29, 88.10, 88.80, 89.50, 89.95, 89.25];
                const options = [5.0];

                const partialHigh  = high.slice(0, -5);
                const partialLow   = low.slice(0, -5);
                const partialClose = close.slice(0, -5);
                const restHigh     = high.slice(-5);
                const restLow      = low.slice(-5);
                const restClose    = close.slice(-5);

                // Info
                const info = trvi.info;
                log(`=== ${info.name.toUpperCase()} (${info.fullName}) ===`);
                log(`Type:    ${info.indicatorType}`);
                log(`Inputs:  ${info.inputs.join(", ")}`);
                log(
                    `Options: ${info.options.length > 0 ? info.options.join(", ") + " (current: " + JSON.stringify(options) + ")" : "none"}`,
                );
                log(`Outputs: ${info.outputs.join(", ")}`);
                if (info.optionalOutputs && info.optionalOutputs.length > 0)
                    log(`Optional: ${info.optionalOutputs.join(", ")}`);
                log(`Min data:          ${trvi.minData(options)}`);
                log();

                // Full calculation with optional outputs [tr, ema]
                const [outputs] = trvi.indicator(
                    [high, low, close],
                    options,
                    [true, true],
                );
                info.outputs.forEach((n, i) =>
                    log(`Full ${n}: ${Array.from(outputs[i])}`),
                );
                if (info.optionalOutputs && info.optionalOutputs.length > 0) {
                    info.optionalOutputs.forEach((n, i) =>
                        log(
                            `Full ${n} (optional): ${Array.from(outputs[info.outputs.length + i])}`,
                        ),
                    );
                }

                // Partial → get state
                const [outputs2, state] = trvi.indicator(
                    [partialHigh, partialLow, partialClose],
                    options,
                );
                log();
                info.outputs.forEach((n, i) =>
                    log(`Partial ${n}: ${Array.from(outputs2[i])}`),
                );

                // Serialise state
                const json = state.toJson();
                log(`\n--- State serialisation ---`);
                log(`toJson()    \u2192 ${json}`);

                // Continue with original state
                const cont = state.batchIndicator([
                    restHigh,
                    restLow,
                    restClose,
                ]);
                log(`\nContinued (+${restHigh.length} bars):`);
                info.outputs.forEach((n, i) =>
                    log(`  ${n}: ${Array.from(cont[i])}`),
                );

                // Restore from JSON → continue
                const fromJson = trvi.State.fromJson(json);
                const contJson = fromJson.batchIndicator([
                    restHigh,
                    restLow,
                    restClose,
                ]);
                log(`fromJson()   continued:`);
                info.outputs.forEach((n, i) =>
                    log(`  ${n}: ${Array.from(contJson[i])}`),
                );

                log(
                    `\nData split: ${partialHigh.length} + ${restHigh.length} = ${high.length} total bars`,
                );
            } catch (err) {
                log(`ERROR: ${err}`);
                console.error(err);
            }
        </script>
    </body>
</html>
