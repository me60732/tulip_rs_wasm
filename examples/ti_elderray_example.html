<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>ELDERRAY — tulip-rs-wasm example</title>
        <style>
            body {
                font-family: monospace;
                padding: 1rem;
                background: #fafafa;
                color: #222;
            }
            h1 {
                font-size: 1.1rem;
                margin: 0 0 0.25rem;
            }
            p {
                color: #666;
                margin: 0 0 1rem;
                font-size: 0.85rem;
            }
            pre {
                background: #f0f0f0;
                padding: 1rem;
                border-radius: 4px;
                white-space: pre-wrap;
                word-break: break-all;
                line-height: 1.5;
            }
        </style>
    </head>
    <body>
        <h1>ELDERRAY — Elder-ray</h1>
        <p>
            Build:
            <code
                >wasm-pack build --target web --out-dir pkg &amp;&amp; npx
                tsc</code
            >, then serve this directory and open in a browser.
        </p>
        <pre id="out">Loading…</pre>
        <script type="module">
            import { init, elderray } from "../index.js";

            const lines = [];
            function log(msg = "") {
                console.log(msg);
                lines.push(String(msg));
                document.getElementById("out").textContent = lines.join("\n");
            }

            try {
                await init();

                const high = [
                    82.15, 81.89, 83.03, 83.3, 83.85, 83.9, 83.33, 84.3, 84.84,
                    85.0, 85.9, 86.58, 86.98, 88.0, 87.87,
                ];
                const low = [
                    81.29, 80.64, 81.31, 82.65, 83.07, 83.11, 82.49, 82.3,
                    84.15, 84.11, 84.03, 85.39, 85.76, 87.17, 87.01,
                ];
                const close = [
                    81.59, 81.06, 82.87, 83.0, 83.61, 83.15, 82.84, 83.99,
                    84.55, 84.36, 85.53, 86.54, 86.89, 87.77, 87.29,
                ];
                const options = [5.0]; // period = 5

                // Slice off the last 5 bars for partial + continuation demo
                const partialHigh = high.slice(0, -5);
                const partialLow = low.slice(0, -5);
                const partialClose = close.slice(0, -5);
                const restHigh = high.slice(-5);
                const restLow = low.slice(-5);
                const restClose = close.slice(-5);

                const info = elderray.info;
                log(`=== ${info.name.toUpperCase()} (${info.fullName}) ===`);
                log(`Type:    ${info.indicatorType}`);
                log(`Inputs:  ${info.inputs.join(", ")}`);
                log(
                    `Options: ${info.options.length > 0 ? info.options.join(", ") + " (current: " + JSON.stringify(options) + ")" : "none"}`,
                );
                log(`Outputs: ${info.outputs.join(", ")}`);
                if (info.optionalOutputs && info.optionalOutputs.length > 0)
                    log(`Optional: ${info.optionalOutputs.join(", ")}`);
                log(`Min data:          ${elderray.minData(options)}`);
                log(
                );
                log();

                // Full calculation — bull and bear power only
                const [outputs] = elderray.indicator(
                    [high, low, close],
                    options,
                );
                log(`Full Bull Power (high - EMA): ${Array.from(outputs[0])}`);
                log(`Full Bear Power (low  - EMA): ${Array.from(outputs[1])}`);

                // Full calculation with optional EMA output
                const [outputsWithEma] = elderray.indicator(
                    [high, low, close],
                    options,
                    [true],
                );
                log();
                log(
                    `Full Bull Power (with EMA): ${Array.from(outputsWithEma[0])}`,
                );
                log(
                    `Full Bear Power (with EMA): ${Array.from(outputsWithEma[1])}`,
                );
                log(`Full EMA line:              ${Array.from(outputsWithEma[2])}`);

                // Partial → get state
                const [outputs2, state] = elderray.indicator(
                    [partialHigh, partialLow, partialClose],
                    options,
                );
                log();
                log(`Partial Bull Power: ${Array.from(outputs2[0])}`);
                log(`Partial Bear Power: ${Array.from(outputs2[1])}`);

                // Serialise state
                const json = state.toJson();
                log(`\n--- State serialisation ---`);
                log(`toJson() → ${json}`);

                // Continue with original state
                const cont = state.batchIndicator([
                    restHigh,
                    restLow,
                    restClose,
                ]);
                log(`\nContinued (+${restHigh.length} bars):`);
                log(`  Bull Power: ${Array.from(cont[0])}`);
                log(`  Bear Power: ${Array.from(cont[1])}`);

                // Restore from JSON → continue
                const fromJson = elderray.State.fromJson(json);
                const contJson = fromJson.batchIndicator([
                    restHigh,
                    restLow,
                    restClose,
                ]);
                log(`fromJson() continued:`);
                log(`  Bull Power: ${Array.from(contJson[0])}`);
                log(`  Bear Power: ${Array.from(contJson[1])}`);

                log(
                    `\nData split: ${partialHigh.length} + ${restHigh.length} = ${high.length} total bars`,
                );
            } catch (err) {
                log(`ERROR: ${err}`);
                console.error(err);
            }
        </script>
    </body>
</html>
