<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>MAMA — tulip-rs-wasm example</title>
        <style>
            body {
                font-family: monospace;
                padding: 1rem;
                background: #fafafa;
                color: #222;
            }
            h1 {
                font-size: 1.1rem;
                margin: 0 0 0.25rem;
            }
            p {
                color: #666;
                margin: 0 0 1rem;
                font-size: 0.85rem;
            }
            pre {
                background: #f0f0f0;
                padding: 1rem;
                border-radius: 4px;
                white-space: pre-wrap;
                word-break: break-all;
                line-height: 1.5;
            }
        </style>
    </head>
    <body>
        <h1>MAMA — MESA Adaptive Moving Average</h1>
        <p>
            Build:
            <code
                >wasm-pack build --target web --out-dir pkg &amp;&amp; npx
                tsc</code
            >, then serve this directory and open in a browser.
        </p>
        <pre id="out">Loading…</pre>
        <script type="module">
            import { init, mama } from "../index.js";

            const lines = [];
            function log(msg = "") {
                console.log(msg);
                lines.push(String(msg));
                document.getElementById("out").textContent = lines.join("\n");
            }

            try {
                await init();

                const close = [
                    81.59, 81.06, 82.87, 83.00, 83.61, 83.15, 82.84, 83.99, 84.55, 84.36,
                    85.53, 86.54, 86.89, 87.77, 87.29, 87.50, 88.10, 88.50, 87.90, 88.20,
                    88.80, 89.10, 88.70, 89.30, 89.70, 90.10, 89.50, 90.20, 90.80, 91.10,
                    90.50, 91.20, 91.80, 92.10, 91.50, 92.20, 92.80, 93.10, 92.50, 93.20,
                ];
                // options: [fast_limit, slow_limit]
                const options = [0.5, 0.05];

                const partialClose = close.slice(0, -5);
                const restClose = close.slice(-5);

                const info = mama.info;
                log(`=== ${info.name.toUpperCase()} (${info.fullName}) ===`);
                log(`Type:    ${info.indicatorType}`);
                log(`Inputs:  ${info.inputs.join(", ")}`);
                log(
                    `Options: ${info.options.length > 0 ? info.options.join(", ") + " (current: " + JSON.stringify(options) + ")" : "none"}`,
                );
                log(`Outputs: ${info.outputs.join(", ")}`);
                if (info.optionalOutputs && info.optionalOutputs.length > 0)
                    log(`Optional: ${info.optionalOutputs.join(", ")}`);
                log(`Min data:          ${mama.minData(options)}`);
                log();

                // Full calculation with optional dc_period and alpha outputs
                const [outputs] = mama.indicator([close], options, [true, true]);
                info.outputs.forEach((n, i) =>
                    log(`Full ${n}: ${Array.from(outputs[i])}`),
                );
                info.optionalOutputs.forEach((n, i) =>
                    log(`Full ${n} (optional): ${Array.from(outputs[info.outputs.length + i])}`),
                );

                // Partial run
                const [outputs2, state] = mama.indicator(
                    [partialClose],
                    options,
                    [true, true],
                );
                log();
                info.outputs.forEach((n, i) =>
                    log(`Partial ${n}: ${Array.from(outputs2[i])}`),
                );
                info.optionalOutputs.forEach((n, i) =>
                    log(`Partial ${n} (optional): ${Array.from(outputs2[info.outputs.length + i])}`),
                );

                // Serialise state
                const json = state.toJson();
                log(`\n--- State serialisation ---`);
                log(`toJson()    \u2192 ${json}`);

                // Continue with original state
                const cont = state.batchIndicator([restClose], [true, true]);
                log(`\nContinued (+${restClose.length} bars):`);
                info.outputs.forEach((n, i) =>
                    log(`  ${n}: ${Array.from(cont[i])}`),
                );
                info.optionalOutputs.forEach((n, i) =>
                    log(`  ${n} (optional): ${Array.from(cont[info.outputs.length + i])}`),
                );

                // Restore from JSON \u2192 continue
                const fromJson = mama.State.fromJson(json);
                const contJson = fromJson.batchIndicator([restClose], [true, true]);
                log(`fromJson()   continued:`);
                info.outputs.forEach((n, i) =>
                    log(`  ${n}: ${Array.from(contJson[i])}`),
                );
                info.optionalOutputs.forEach((n, i) =>
                    log(`  ${n} (optional): ${Array.from(contJson[info.outputs.length + i])}`),
                );

                log(
                    `\nData split: ${partialClose.length} + ${restClose.length} = ${close.length} total bars`,
                );
            } catch (err) {
                log(`ERROR: ${err}`);
                console.error(err);
            }
        </script>
    </body>
</html>
